services:
  postgres:
    image: postgres:15-alpine
    container_name: nest-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: nest-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    volumes:
      - redis_insight_data:/data
    networks:
      - app-network
    depends_on:
      - redis

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: nest-backend
    restart: always
    image: nailyn1/costumes-backend:latest
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: ./apps/crm-frontend/Dockerfile
    container_name: crm-frontend
    restart: always
    image: nailyn1/costumes-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      - backend
networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  redis_insight_data:
